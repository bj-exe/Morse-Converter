<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Morse Code Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
  <header>
    <h2>Morse Code Converter</h2>
    <div class="mt-2">
      <button class="btn btn-sm btn-secondary" onclick="toggleTheme()">Toggle Theme</button>
      <button class="btn btn-sm btn-info" data-bs-toggle="modal" data-bs-target="#settingsModal">Settings</button>
    </div>
  </header>

  <!-- Panels -->
  <div class="container my-4">
    <div class="row align-items-center">
      <!-- Left Panel -->
      <div class="col-md-5">
        <div class="card input-panel shadow panel">
          <div class="card-body">
            <h5 class="card-title" id="leftTitle">TEXT</h5>
            <textarea id="inputText" class="form-control" rows="6" placeholder="Enter text or Morse code..."></textarea>
            <div class="text-end mt-2">
              <span class="icon-btn" onclick="playInput()"><i class="fas fa-play-circle"></i></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Toggle Arrow -->
      <div class="col-md-2 text-center">
        <span class="icon-btn" onclick="toggleMode()"><i class="fas fa-exchange-alt"></i></span>
        <p id="modeLabel" class="mt-2">Text → Morse</p>
      </div>

      <!-- Right Panel -->
      <div class="col-md-5">
        <div class="card output-panel shadow panel">
          <div class="card-body">
            <h5 class="card-title" id="rightTitle">MORSE</h5>
            <textarea id="outputBox" class="form-control" rows="6" readonly></textarea>
            <div class="text-end mt-2">
              <span class="icon-btn" onclick="copyOutput()"><i class="fas fa-copy"></i></span>
              <span class="icon-btn" onclick="playOutput()"><i class="fas fa-play-circle"></i></span>
            </div>
          </div>
        </div>
      </div>
    </div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-primary" onclick="convert()">Convert</button>
</div>

<!-- Settings Modal -->
<div class="modal fade" id="settingsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <label class="form-label">Alphabet</label>
        <select id="alphabet" class="form-select mb-3">
          <option>Latin</option>
        </select>

        <label class="form-label">Waveform</label>
        <select id="waveform" class="form-select mb-3">
          <option>Sine</option>
          <option>Square</option>
          <option>Triangle</option>
          <option>Sawtooth</option>
        </select>

        <label class="form-label">WPM</label>
        <input id="wpm" type="number" class="form-control mb-3" value="20">

        <label class="form-label">Frequency (Hz)</label>
        <input id="frequency" type="number" class="form-control mb-3" value="550">
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>


  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
